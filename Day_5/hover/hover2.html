<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #box{
            width: 200px;
            height: 200px;
            background-color: red;
        }
        #box:hover{
            background-color: blue;
            transform:translateX(100px);
            transition:2s;
            transform:rotate(210deg);
            transform:scale(2.02);
        }
        </style>
</head>
<body>
    <div id="box">
        HII
    </div>
    
</body>
</html>
