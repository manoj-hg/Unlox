<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table</title>
</head>
<body>
    <table border="1" cellspacing="04" cellpadding="20" bgcolor="lightblue">
        <thead bgcolor="lightgray" align="center">
            <tr>
            <th>Name</th>
            <th>Age</th>
            <th>City</th>
        </tr>
        </thead>
        <tbody align="center" bgcolor="lightyellow">
        <tr>
            <td>John Doe</td>
            <td>30</td>
            <td>New York</td>
        </tr>
        <tr>
            <td>Jane Smith</td>
            <td>25</td>
            <td>Los Angeles</td>
        </tr>
        <tr>
            <td>Bob Johnson</td>
            <td>35</td>
            <td>Chicago</td>
        </tr>
        <tr>
            <td>Alice Brown</td>
            <td>28</td>
            <td>Houston</td>
        </tr>
        </tbody>
    </table>
</body>
</html>
